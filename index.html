<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kooda | Join the Adventure</title>
    <style>
        /* STEAM & ROBLOX MIXED STYLE */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #1b2838 0%, #000000 100%); /* Steam Blue-Dark */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            background: rgba(33, 35, 41, 0.95); /* Roblox Dark Mode */
            padding: 40px;
            border-radius: 20px; /* Roblox Roundedness */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid #3a3a3a;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            color: #ffffff;
        }

        p {
            color: #b8b6b4; /* Steam Text Color */
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #1999ff; /* Steam Highlight Blue */
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #171a21; /* Steam Input Background */
            color: white;
            box-sizing: border-box;
            outline: none;
            border: 1px solid #333;
        }

        input:focus {
            border: 1px solid #1999ff;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 50px; /* Roblox Style Button */
            background: linear-gradient(to right, #47bfff, #1a7bff); /* Steam Gradient */
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-register:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(25, 153, 255, 0.4);
        }

        .footer-links {
            margin-top: 20px;
            font-size: 12px;
            color: #66c0f4;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1>KOODA</h1>
        <p>Create your player account</p>

        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="GamerName123">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="you@example.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
        </div>

        <button class="btn-register">Create Account</button>

        <div class="footer-links">
            Already have an account? Login
        </div>
    </div>

</body>
</html>
